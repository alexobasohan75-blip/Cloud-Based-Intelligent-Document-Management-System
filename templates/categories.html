{% extends 'base.html' %}{% block content %}<div class="card p-4 mb-4"><h3>Add Category</h3><form method="post">{% csrf_token %}<input class="form-control mb-2" name="category_name" placeholder="Category name"><textarea class="form-control mb-2" name="description" placeholder="Description"></textarea><button class="btn btn-primary">Save</button></form></div><div class="card p-4"><h3>Categories</h3><table class="table"><tr><th>Name</th><th>Description</th></tr>{% for c in categories %}<tr><td>{{ c.category_name }}</td><td>{{ c.description }}</td></tr>{% endfor %}</table></div>{% endblock %}
