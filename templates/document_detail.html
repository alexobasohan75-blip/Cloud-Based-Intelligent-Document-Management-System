{% extends 'base.html' %}{% load mongo_extras %}{% block content %}<div class="card p-4"><h3>{{ doc.title }}</h3><p><span class="badge badge-soft">{{ doc.category }}</span> <span class="text-muted">{{ doc.file_type }} • {{ doc.upload_date|dt }}</span></p><a class="btn btn-primary mb-3" href="{{ doc.file_url }}" target="_blank">Preview / Download</a><a class="btn btn-outline-danger mb-3" href="/document/{{ doc|mongo_id }}/delete/">Delete</a><h5>Extracted Text Preview</h5><div class="preview-box">{{ doc.extracted_text|truncatechars:7000 }}</div></div>{% endblock %}
