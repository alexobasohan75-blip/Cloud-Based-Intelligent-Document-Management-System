{% extends 'base.html' %}{% block content %}<div class="row justify-content-center"><div class="col-md-6"><div class="card p-4"><h3>Create Account</h3><form method="post">{% csrf_token %}<input class="form-control mb-3" name="name" placeholder="Full name" required><input class="form-control mb-3" type="email" name="email" placeholder="Email" required><input class="form-control mb-3" type="password" name="password" placeholder="Password" required><select class="form-select mb-3" name="role"><option value="user">User</option><option value="admin">Admin</option></select><button class="btn btn-primary w-100">Register</button></form></div></div></div>{% endblock %}
