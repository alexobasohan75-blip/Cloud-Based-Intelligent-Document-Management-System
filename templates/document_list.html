{% extends 'base.html' %}{% load mongo_extras %}{% block content %}<div class="d-flex justify-content-between mb-3"><h2>Documents</h2><a href="/upload/" class="btn btn-primary">Upload</a></div><div class="card p-4"><form class="mb-3"><select name="category" class="form-select" onchange="this.form.submit()"><option value="">All categories</option>{% for c in categories %}<option {% if selected == c.category_name %}selected{% endif %}>{{ c.category_name }}</option>{% endfor %}</select></form><table class="table"><tr><th>Title</th><th>Category</th><th>Uploader</th><th>Date</th><th></th></tr>{% for doc in documents %}<tr><td>{{ doc.title }}</td><td>{{ doc.category }}</td><td>{{ doc.uploaded_by_name }}</td><td>{{ doc.upload_date|dt }}</td><td><a href="/document/{{ doc|mongo_id }}/" class="btn btn-sm btn-outline-primary">View</a></td></tr>{% empty %}<tr><td colspan="5">No document found.</td></tr>{% endfor %}</table></div>{% endblock %}
