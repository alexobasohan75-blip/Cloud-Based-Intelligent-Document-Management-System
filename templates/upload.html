{% extends "base.html" %}

{% block title %}
    Upload Document | Intelligent DMS
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="content-card p-4 p-md-5">
            <div class="mb-4">
                <span class="page-label">
                    New document
                </span>

                <h1 class="section-title mb-2">
                    Upload Document
                </h1>

                <p class="text-secondary mb-0">
                    Supported files: PDF, DOCX and TXT. Maximum size: 10 MB.
                </p>
            </div>

            <form
                method="post"
                enctype="multipart/form-data"
            >
                {% csrf_token %}

                <div class="mb-3">
                    <label
                        for="title"
                        class="form-label"
                    >
                        Document title
                    </label>

                    <input
                        id="title"
                        class="form-control"
                        name="title"
                        placeholder="Leave blank to use the filename"
                    >
                </div>

                <div class="mb-4">
                    <label
                        for="document"
                        class="form-label"
                    >
                        Select file
                    </label>

                    <input
                        id="document"
                        class="form-control"
                        type="file"
                        name="document"
                        accept=".pdf,.docx,.txt"
                        required
                    >
                </div>

                <button
                    type="submit"
                    class="btn btn-primary"
                >
                    <i class="bi bi-cloud-arrow-up me-2"></i>
                    Upload and classify
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
